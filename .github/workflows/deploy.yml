name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build React App

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Install backend dependencies
        run: npm ci

      - name: Verify server starts
        run: timeout 5 node server.js || true
        env:
          PORT: 3001
          JWT_SECRET: ci-test-secret

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Trigger Render Deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -s "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Auto-deploy note
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "ℹ️ Add RENDER_DEPLOY_HOOK_URL as a GitHub secret to trigger Render deployments automatically."
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
